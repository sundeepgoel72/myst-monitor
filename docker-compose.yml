services:
  mystmon:
    image: ${MYSTMON_IMAGE:-ghcr.io/your-org/mystmon:0.74}
    container_name: mystmon
    network_mode: host
    environment:
      MYSTMON_CONFIG: ${MYSTMON_CONFIG:-/app/config.yaml}
      MYSTMON_HOST: ${MYSTMON_HOST:-0.0.0.0}
      MYSTMON_PORT: ${MYSTMON_PORT:-8072}
      MYSTMON_TEQUILAPI_PASSWORD: ${MYSTMON_TEQUILAPI_PASSWORD:-}
      MYSTMON_SSH_PASSWORD: ${MYSTMON_SSH_PASSWORD:-}
      MYSTNODES_EMAIL: ${MYSTNODES_EMAIL:-}
      MYSTNODES_PASSWORD: ${MYSTNODES_PASSWORD:-}
      MYSTMON_EXPECTED_NODE_COUNT: ${MYSTMON_EXPECTED_NODE_COUNT:-8}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/data/mystmon
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles:
      - prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
