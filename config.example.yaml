service:
  name: mystmon
  poll_interval_seconds: 21600
  timezone: Asia/Kolkata

# Optional local MYST runtime discovery.
# Leave disabled in the base sample unless you are also collecting local runtimes.
#
# The low-level API endpoint list is not shown here because the application already
# carries safe defaults in code.
myst:
  enabled: false
  api_probe_enabled: true
  api_default_port: 4050

outputs:
  csv_export_path: data/csv

mystnodes_accounts:
  - account: your-myst-email@example.com
    enabled: true
    password: change-me
    wallet_address: "0x1234567890abcdef1234567890abcdef12345678"

# Deferred sections for later use.
# Keep these disabled unless you are explicitly enabling those features.
prometheus:
  enabled: false
  targets: []

snmp:
  enabled: false
  targets: []

telegram:
  enabled: false

ui:
  enabled: false

alerting:
  enabled: false
