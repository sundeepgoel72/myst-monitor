# Local override sample for MystMon
# Copy to config.local.yaml and edit the MystNodes credentials.
# Secrets that belong in the environment stay in `.env`, not here.

service:
  timezone: "Asia/Kolkata"

mystnodes:
  base_url: "https://my.mystnodes.com"

mystnodes_accounts:
  - account: "account-a"
    enabled: true
    password: "change-me"
    wallet_address: "0x9A183F79b7b803DF658DB0aC6159f0016e9db4bE"
    remember: true
    request_delay_seconds: 1.0
    retry_count: 2
    retry_delay_seconds: 2.0
    node_detail_enabled: true
    node_services_enabled: false
    node_totals_enabled: true
    node_totals_days: 30
    endpoints:
      - name: "me"
        path: "/api/v2/me"
      - name: "nodes"
        path: "/api/v2/node"
        params:
          page: 1
          itemsPerPage: 100
      - name: "total_earnings"
        path: "/api/v2/node/total-earnings"
      - name: "total_transferred"
        path: "/api/v2/node/total-transferred"
        params:
          days: 30
      - name: "earnings_30d"
        path: "/api/v2/node/earnings"
        params:
          days: 30

  - account: "account-b"
    enabled: true
    password: "change-me"
    wallet_address: "0x9A183F79b7b803DF658DB0aC6159f0016e9db4bE"
    remember: true
    request_delay_seconds: 1.0
    retry_count: 2
    retry_delay_seconds: 2.0
    node_detail_enabled: true
    node_services_enabled: false
    node_totals_enabled: true
    node_totals_days: 30
    endpoints:
      - name: "me"
        path: "/api/v2/me"
      - name: "nodes"
        path: "/api/v2/node"
        params:
          page: 1
          itemsPerPage: 100
      - name: "total_earnings"
        path: "/api/v2/node/total-earnings"
      - name: "total_transferred"
        path: "/api/v2/node/total-transferred"
        params:
          days: 30
      - name: "earnings_30d"
        path: "/api/v2/node/earnings"
        params:
          days: 30
