services:
  mystmon-dev:
    image: ${MYSTMON_IMAGE:-ghcr.io/sundeepgoel72/mystmon:dev}
    container_name: mystmon-dev
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8072/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
