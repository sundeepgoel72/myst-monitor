services:
  mystmon:
    build: .
    image: ${MYSTMON_IMAGE:-mystmon:0.75.0-beta.3}
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8072/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
